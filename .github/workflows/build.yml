name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GODOT_VERSION: "4.6.3"
  EXPORT_NAME: "fps"

jobs:
  build:
    name: Export (Windows + Web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot and export templates
        run: |
          set -euo pipefail
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fL -o godot.zip "$base/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -fL -o templates.tpz "$base/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"

          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot

          # Templates extract into a "templates/" directory and must live under
          # the version-specific export_templates path Godot looks them up in.
          unzip -q templates.tpz
          template_dir="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$template_dir"
          mv templates/* "$template_dir/"

      - name: Fetch WebRTC extension (desktop online support; best-effort)
        run: bash scripts/fetch_webrtc.sh

      # Tee Godot output to build.log so the verify step below can fail the run
      # on parse/autoload errors — a Godot export exits 0 even when scripts fail
      # to compile, so success alone does not mean the project is healthy.
      - name: Import project
        run: ./godot --headless --path . --import 2>&1 | tee -a build.log

      - name: Export Windows build
        run: |
          set -euo pipefail
          mkdir -p build/windows
          ./godot --headless --path . --export-release "Windows Desktop" "build/windows/${EXPORT_NAME}.exe" 2>&1 | tee -a build.log
          test -f "build/windows/${EXPORT_NAME}.exe"

      - name: Export Web build
        run: |
          set -euo pipefail
          mkdir -p build/web
          ./godot --headless --path . --export-release "Web" "build/web/index.html" 2>&1 | tee -a build.log
          test -f "build/web/index.html"

      - name: Verify no GDScript parse / autoload errors
        run: |
          if grep -nE "SCRIPT ERROR|Parse Error|Failed to load script|Failed to create an autoload|does not inherit from" build.log; then
            echo "::error::GDScript parse or autoload errors detected during export (see matches above)."
            exit 1
          fi
          echo "No GDScript parse/autoload errors detected."

      - name: Archive builds
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          (cd build/windows && zip -r "../../${EXPORT_NAME}-windows.zip" .)
          (cd build/web && zip -r "../../${EXPORT_NAME}-web.zip" .)

      - name: Publish to GitHub Releases (rolling latest)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Roll the "latest" release forward to this commit's builds.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            "${EXPORT_NAME}-windows.zip" \
            "${EXPORT_NAME}-web.zip" \
            --title "Latest main build" \
            --notes "Automated build from ${GITHUB_SHA}." \
            --target "${GITHUB_SHA}" \
            --prerelease

      - name: Upload Pages artifact (web build)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    name: Deploy Web to GitHub Pages
    needs: build
    # Only publish to production Pages from main; PRs build+export for validation
    # without deploying.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
